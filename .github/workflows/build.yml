name: BattleLuck Build

on:
  push:
    branches: [mainss]
  pull_request:
    branches: [mainss]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x
          cache: true
          cache-dependency-path: packages.lock.json

      - name: Restore
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Check whitespace errors
        shell: pwsh
        run: git diff --check HEAD~1 HEAD
