name: BattleLuck Build

on:
  push:
    branches: [main, mainss]
  pull_request:
    branches: [main, mainss]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: packages.lock.json

      - name: Restore
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore

      - name: Run unit tests
        run: dotnet test BattleLuck.Tests/BattleLuck.Tests.csproj -c Release --no-restore

      - name: Reject tracked webhook credentials
        shell: pwsh
        run: |
          git grep -En 'https?://(discord(app)?\.com|discord\.com)/api/webhooks/[A-Za-z0-9_./-]+' -- . ':!docs/**'
          if ($LASTEXITCODE -eq 0) { throw 'Tracked Discord webhook credential detected.' }
          exit 0

      - name: Package server-only artifact
        shell: pwsh
        run: |
          $stage = Join-Path $PWD 'dist/BattleLuck'
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item 'bin/Release/net6.0/BattleLuck.dll','bin/Release/net6.0/BouncyCastle.Cryptography.dll','bin/Release/net6.0/HookDOTS.API.dll','manifest.json','README.md','CHANGELOG.md','LICENSE','icon.png' -Destination $stage
          if (Get-ChildItem $stage -Recurse -File | Where-Object Name -Match 'client|zui|universe|node') { throw 'Client or sidecar content entered the server package.' }
          Compress-Archive -Path "$stage/*" -DestinationPath 'dist/BattleLuck-server.zip' -Force

      - name: Check whitespace errors
        shell: pwsh
        run: git diff --check HEAD~1 HEAD
