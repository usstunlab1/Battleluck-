name: BattleLuck Build

on:
  push:
    branches: [main, mainss]
  pull_request:
    branches: [main, mainss]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: packages.lock.json

      - name: Restore
        run: dotnet restore BattleLuck.sln --locked-mode

      - name: Build Release
        run: dotnet build BattleLuck.sln -c Release --no-restore

      - name: Run unit tests with coverage
        run: dotnet test BattleLuck.Tests/BattleLuck.Tests.csproj -c Release --no-build --no-restore --collect:"XPlat Code Coverage" --results-directory artifacts/test-results

      - name: Reject vulnerable NuGet dependencies
        shell: pwsh
        run: |
          $report = dotnet list BattleLuck.sln package --vulnerable --include-transitive --format json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) { throw 'NuGet vulnerability scan failed.' }
          $findings = @(
            foreach ($project in $report.projects) {
              foreach ($framework in @($project.frameworks)) {
                @($framework.topLevelPackages) + @($framework.transitivePackages) |
                  Where-Object { $_.vulnerabilities }
              }
            }
          )
          if ($findings.Count -ne 0) { throw "NuGet reported $($findings.Count) vulnerable package entries." }

      - name: Reject tracked webhook credentials
        shell: pwsh
        run: |
          git grep -En 'https?://(discord(app)?\.com|discord\.com)/api/webhooks/[A-Za-z0-9_./-]+' -- . ':!docs/**'
          if ($LASTEXITCODE -eq 0) { throw 'Tracked Discord webhook credential detected.' }
          exit 0

      - name: Package server-only artifact
        shell: pwsh
        run: ./tools/New-BattleLuckRelease.ps1

      - name: Check whitespace errors
        shell: pwsh
        run: git diff-tree --check --no-commit-id -r HEAD

      - name: Upload server package and test evidence
        uses: actions/upload-artifact@v4
        with:
          name: BattleLuck-${{ github.sha }}
          path: |
            dist/BattleLuck-server-*.zip
            dist/BattleLuck-server-*.zip.sha256
            artifacts/test-results/**
