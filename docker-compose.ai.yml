services:
  ollama:
    image: ollama/ollama:latest
    container_name: battleluck-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  llama2-init:
    image: ollama/ollama:latest
    container_name: battleluck-llama2-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/ollama"]
    command: ["pull", "llama2"]
    restart: "no"

volumes:
  ollama_data:
